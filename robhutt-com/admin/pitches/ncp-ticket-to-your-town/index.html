<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pitch Detail | Rob Hutt</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,900&family=Spline+Sans+Mono:wght@400;500;700&display=swap" rel="stylesheet"><style>:root{--ink:#0d0b08;--paper:#f4efe6;--paper2:#e8dfcf;--gold:#c8962a;--gold2:#e8b13d;--rust:#9a3a1f;--line:rgba(13,11,8,.16);--dark:#15110b;--mono:'Spline Sans Mono',ui-monospace,monospace;--display:'Fraunces',Georgia,serif}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--display)}.wrap{padding:clamp(24px,5vw,70px);max-width:1220px;margin:auto}.kicker,.label{font:700 12px var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}h1{font-size:clamp(2.6rem,6vw,5.8rem);line-height:.96;font-weight:300;letter-spacing:-.04em;margin:18px 0}.grid{display:grid;grid-template-columns:1fr .8fr;gap:20px}.panel{background:rgba(232,223,207,.6);border:1px solid var(--line);border-radius:8px;padding:24px}.dark{background:linear-gradient(160deg,#15110b,#20170d);color:var(--paper);border-color:rgba(232,177,61,.18)}.dark p{color:rgba(244,239,230,.76)}p,li{font-size:1.08rem;line-height:1.55}.muted{color:rgba(13,11,8,.62)}.mono,pre{font:500 13px var(--mono);white-space:pre-wrap;word-break:break-word}.status{display:inline-flex;border:1px solid rgba(154,58,31,.28);border-radius:999px;padding:7px 10px;background:rgba(244,239,230,.55);font:700 11px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--rust)}.actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.btn{border:0;border-radius:3px;background:var(--gold2);color:var(--ink);padding:12px 14px;font:700 11px var(--mono);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;cursor:pointer}.btn.ghost{background:transparent;border:1px solid var(--line)}.dark .btn.ghost{color:var(--paper);border-color:rgba(244,239,230,.24)}textarea{width:100%;min-height:220px;resize:vertical;background:rgba(244,239,230,.78);border:1px solid var(--line);padding:14px;font:500 13px var(--mono);line-height:1.5}select{background:rgba(244,239,230,.78);border:1px solid var(--line);padding:12px;font:700 11px var(--mono);letter-spacing:.12em;text-transform:uppercase}.hero-preview,.hero-placeholder{width:100%;border-radius:8px;border:1px solid var(--line);margin-top:12px}.hero-preview{display:block;max-height:260px;object-fit:cover}.hero-placeholder{display:grid;place-items:center;min-height:180px;background:rgba(13,11,8,.07);font:700 12px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:rgba(13,11,8,.55)}.timeline{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.toast{position:fixed;right:18px;bottom:18px;background:var(--dark);color:var(--paper);padding:14px 16px;border-radius:6px;font:700 12px var(--mono);opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:none}@media(max-width:900px){.grid,.timeline{grid-template-columns:1fr}}</style></head><body><main class="wrap" id="app"></main><div class="toast" id="toast">Copied</div><script type="module">
import{opportunities}from'/assets/js/opportunities.js';
const slug=location.pathname.split('/').filter(Boolean).pop();const o=opportunities[slug];const root=location.origin;const $=id=>document.getElementById(id);const imageStatuses=['needed','drafted','generated','approved'];
const esc=s=>(s||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const isUrl=value=>/^https?:/.test(value||'');
function copy(text){navigator.clipboard.writeText(text);$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1200)}
if(!o){$('app').innerHTML='<p>Pitch not found. <a href="/admin/pitches">Back to pitches</a></p>'}else{const a=o.pitchAdmin||{};const c={company:o.companyName,...(a.contact||{})};const privateUrl=`${root}/opportunities/${slug}`;const imageStatus=sessionStorage.getItem(`pitch-image-status:${slug}`)||o.imagePromptStatus||'needed';const prompt=o.imagePrompt||'';const hero=isUrl(o.heroImage)?`<img class="hero-preview" src="${esc(o.heroImage)}" alt="${esc(o.campaignTitle)} hero preview">`:`<div class="hero-placeholder">No generated hero image yet.</div>`;const email=`Subject:\nA private campaign idea for ${o.companyName}\n\nBody:\nHi ${c.name||'there'},\n\nI put together a private concept for ${o.companyName} because I noticed a customer story I think you could own more visibly.\n\nIt is not a generic agency pitch. It is a short Strategic Opportunity Memo showing the campaign idea, why I think it works, and what it could unlock.\n\nPrivate link: ${privateUrl}\nAccess code: ${o.password}\n\nI would value your thoughts if it feels relevant.\n\nRob`;$('app').innerHTML=`<a class="btn ghost" href="/admin/pitches">Back to pitches</a><div class="kicker">Pitch detail</div><h1>${esc(o.companyName)}: ${esc(o.campaignTitle)}</h1><div class="actions"><button class="btn" id="copyLink">Copy link</button><button class="btn" id="copyPass">Copy password</button><button class="btn" id="copyEmail">Copy email snippet</button><a class="btn ghost" href="${privateUrl}" target="_blank">Open private pitch</a></div><section class="grid"><article class="panel dark"><div class="label">Campaign</div><p><span class="status">${(a.status||'draft').replaceAll('_',' ')}</span></p><p><strong>Company:</strong> ${esc(o.companyName)}<br><strong>Private URL:</strong> <span class="mono">${privateUrl}</span><br><strong>Access code:</strong> <span class="mono">${esc(o.password)}</span></p><p>These access codes are lightweight viewing codes for exploratory pitch pages, not account passwords.</p></article><article class="panel"><div class="label">Image Prompt</div><p><span class="status">${imageStatus}</span></p><textarea id="imagePrompt" readonly>${esc(prompt)}</textarea><div class="actions"><button class="btn" id="copyImagePrompt">Copy Image Prompt</button><select id="imageStatus">${imageStatuses.map(s=>`<option ${imageStatus===s?'selected':''} value="${s}">${s}</option>`).join('')}</select></div><div class="label">Hero image preview</div>${hero}</article><article class="panel"><div class="label">Contact</div><p><strong>${esc(c.name||'No named contact yet')}</strong><br>${esc(c.role||'')}<br>${esc(c.company||o.companyName)}<br>${esc(c.email||'No email yet')}<br>${c.linkedinUrl?`<a href="${esc(c.linkedinUrl)}" target="_blank">${esc(c.linkedinUrl)}</a>`:'No LinkedIn yet'}<br>${esc(c.phone||'')}</p><p class="muted">${esc(c.notes||'')}</p></article><article class="panel"><div class="label">Outreach notes</div><p>${esc(a.notes||'No notes yet.')}</p><div class="timeline"><p><strong>Created</strong><br>${a.createdAt||'—'}</p><p><strong>Sent</strong><br>${a.sentAt||'—'}</p><p><strong>Followed up</strong><br>${a.lastContactedAt||'—'}</p><p><strong>Replied</strong><br>${a.repliedAt||'—'}</p><p><strong>Next action</strong><br>${a.followUpAt||'—'}</p></div></article><article class="panel"><div class="label">Suggested email intro</div><pre id="emailText">${esc(email)}</pre></article></section>`;$('copyLink').onclick=()=>copy(privateUrl);$('copyPass').onclick=()=>copy(o.password);$('copyEmail').onclick=()=>copy(email);$('copyImagePrompt').onclick=()=>copy(prompt);$('imageStatus').onchange=e=>{sessionStorage.setItem(`pitch-image-status:${slug}`,e.target.value)}}
</script></body></html>
